<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {

.mast { position: absolute; left: 42pt; top: 26pt; right: 42pt; height: 30pt; border-bottom: 1pt solid #D8D0C5; }

.kicker { position:absolute; left: 42pt; top: 86pt; width: 150pt; }

.title { position:absolute; left: 42pt; top: 120pt; width: 520pt; }
.title h1 { margin:0; font-size: 36pt; line-height: 1.06; color: #1D2528; font-weight: 800; letter-spacing: 0; }
.subtitle { position:absolute; left: 42pt; top: 214pt; width: 500pt; }
.subtitle p { margin:0; font-size: 17pt; line-height: 1.42; color: #667074; }

.note p { font-size: 10.5pt; color: #667074; line-height: 1.45; margin: 0; }
.panel { position:absolute; background: #FFFFFF; border: 1pt solid #D8D0C5; border-radius: 4pt; padding: 14pt; }
.panel h2 { margin: 0 0 7pt 0; font-size: 15pt; line-height:1.2; color: #1D2528; }
.panel p { margin: 0; font-size: 10.5pt; line-height: 1.45; color: #667074; }
.big-num h2 { font-size: 30pt; line-height: 1; margin: 0; color: #B9532B; }
.tag { position:absolute; background: #1E2A2F; border-radius: 999pt; padding: 5pt 10pt; }
.tag p { margin:0; color:white; font-size: 9pt; }
.small { font-size: 9pt !important; }
.grid-table { position:absolute; left:42pt; top:126pt; width:876pt; }
.row { display:flex; border-bottom:1pt solid #D8D0C5; min-height:25pt; }
.cell { padding:5pt 6pt; }
.cell p { margin:0; font-size:8.7pt; line-height:1.25; color:#1D2528; }
