<body>
  <main class="deck" aria-label="Oh-My-Codex 深度解析 HTML 幻灯片">
    <div class="stage-shell"><iframe id="stage" title="当前幻灯片" src="slides/01.html" allowfullscreen></iframe></div>
  </main>
  <aside class="notes" id="notes" aria-hidden="true"><h2 id="notesTitle"></h2><div class="notes-meta" id="notesMeta"></div><p id="notesBody"></p></aside>
  <nav class="controls" aria-label="幻灯片控制">
    <button class="control" id="prev" type="button" aria-label="上一页" title="上一页">‹</button>
    <div class="counter" id="counter">01 / 17</div>
    <button class="control" id="next" type="button" aria-label="下一页" title="下一页">›</button>

    <button class="control" id="fullscreen" type="button" aria-label="全屏" title="全屏">⛶</button>
  </nav>
  <div class="progress"><span id="progress"></span></div>
  <script>
    const slides = [{"title":"Oh-My-Codex (OMX)","notes":"大家好，今天我将为大家深入介绍一个革命性的AI编程工具——Oh-My-Codex，简称OMX。它并非一个新的大模型，而是现有AI编程工具的“超级大脑”和“指挥中心”。本次分享将带大家全面了解OMX的定位、底层原理、实际应用以及它如何改变我们的开发工作流。"},{"title":"目录 CONTENTS","notes":"本次分享将分为四个部分。首先，我们会明确OMX的工具定位，搞清楚它到底是什么。接着，我们会深入拆解其四层架构和底层原理。然后，我会通过一个完整的实操教程，带大家体验如何使用OMX。最后，我们会总结它的优缺点，并与其他工具进行对比。"},{"title":"01. 工具定位：它到底是什么？","notes":"首先，我们来明确OMX的定位。请记住，OMX不是一个新的AI模型，它的核心是一个“编排框架”。就像我们熟悉的oh-my-zsh增强了原生的zsh一样，OMX增强了OpenAI Codex CLI。它解决了原生Codex在处理复杂项目时的诸多痛点，比如没有记忆、无法并行等，为AI编程提供了一套完整的工程化解决方案。"},{"title":"01. 工具定位：四大新增核心能力","notes":"OMX通过四大核心能力实现了对原生Codex的全面升级。首先是持久化记忆系统，让AI不再“健忘”。其次，它内置了33个专精角色的Agent，让任务能被分配给最合适的“专家”。第三，它提供了标准化的研发流水线，确保开发过程的规范和可控。最后，也是最具创新性的，它通过Git Worktree实现了多AI并行开发，极大地提升了效率。"},{"title":"02. 底层原理完整拆解","notes":"接下来，我们将深入OMX的内部，拆解它的四层架构。理解这四层，就能明白OMX为何如此强大。我们将从最底层的代码分析开始，一直到最顶层的流水线状态机。"},{"title":"原理第一层：代码库静态图谱构建","notes":"第一层是代码库静态图谱构建。OMX非常聪明，它不会一股脑把所有代码都喂给AI。而是先在本地进行代码分析，生成一个精简的、结构化的代码图谱。这个图谱包含了所有关键信息，如函数、变量和它们之间的调用关系。这样，AI只需要理解这个图谱，就能掌握整个项目的结构，大大提高了效率和准确性。"},{"title":"原理第二层：MCP 持久化上下文服务器","notes":"第二层是MCP持久化上下文服务器，这是OMX的“外脑”。它解决了所有AI工具最大的痛点之一——健忘。OMX通过一系列本地服务，将任务的状态、计划、对话历史都保存下来。这意味着，即使你关闭终端，下次打开依然可以从上次中断的地方继续，就像我们使用IDE一样，真正实现了长周期任务的开发。"},{"title":"原理第三层：多Agent调度系统","notes":"第三层是多Agent调度系统。OMX内置了33个不同角色的AI专家，比如架构师、测试工程师等。当接到任务时，OMX会像项目经理一样，将任务分解并分配给最合适的Agent。最核心的是它的Team模式，通过Git Worktree技术，实现了多个AI并行开发且互不干扰，彻底解决了代码冲突问题，让复杂项目的开发速度呈指数级提升。"},{"title":"原理第四层：固定阶段式状态机流水线","notes":"第四层是固定阶段式状态机流水线。这保证了AI的工作是规范和可控的。整个流程分为四步：首先，通过深度访谈澄清需求；然后，生成详细的架构计划并等待人工确认；接着，选择单Agent或多Agent模式执行；最后，自动进行测试和修复，形成一个完整的闭环。这套流程杜绝了AI自由发挥，确保最终产出符合预期。"},{"title":"03. 完整实操使用教程","notes":"理论说完了，我们来点实际的。接下来，我将带大家走一遍OMX的完整使用流程，从安装配置到执行一个标准的开发任务，让大家直观感受它的强大。"},{"title":"安装与初始化","notes":"安装OMX非常简单。首先确保你的环境满足几个前置条件，然后通过npm全局安装。安装后执行setup命令进行初始化，并使用doctor命令检查环境是否就绪。启动OMX有多种强度模式，对于复杂任务，推荐使用最强的madmax模式。"},{"title":"核心流水线完整实操","notes":"OMX的标准工作流非常清晰，分为三步。第一步，用$deep-interview命令让AI帮你澄清和细化需求。第二步，用$ralplan命令生成详细的架构方案，你需要确认方案无误。第三步，选择$ralph单Agent或$team多Agent模式开始执行。整个过程自动化程度非常高，你只需要在关键节点进行确认。"},{"title":"进阶用法：团队并行与自定义","notes":"OMX还提供了非常强大的进阶功能。你可以混合使用不同的AI模型，组建一个多模型团队。内置的37个快捷技能可以帮你快速完成特定任务，比如自动修复所有代码错误。更棒的是，你可以通过在项目中创建AGENTS.md文件，来定制AI团队的行为规范，让它完美适应你的项目。"},{"title":"04. 总结：核心优缺点与适用场景","notes":"总结一下OMX的优缺点。它的优势非常明显：工程化、并行开发、持久化、可控性和兼容性，这些特性让它成为处理大型AI开发任务的利器。当然，它也有一些局限，比如依赖Codex和对Windows的支持有待加强。但总体来说，它的优点远远大于缺点。"},{"title":"最佳使用场景","notes":"那么，OMX最适合用在哪些场景呢？我推荐四个最佳场景：第一，大型代码重构和架构改造，这是它最擅长的领域。第二，从零开始开发一个完整的项目。第三，当你需要快速理解一个庞大而古老的遗留代码库时。第四，任何需要批量修改大量文件的任务。在这些场景下，OMX能发挥出最大的价值。"},{"title":"竞品对比：OMX vs Cursor/Claude Code","notes":"最后，我们来看看OMX和其他热门AI编程工具的区别。像Cursor或Claude Code，它们是一体化的GUI工具，更像一个智能编辑器。而原生的Codex CLI只是一个底层引擎。OMX的定位完全不同，它是一个编排调度层，它的目标不是替代这些工具，而是驾驭它们，将它们组合成一个强大的、可定制的AI软件工程平台。"},{"title":"Q&A","notes":"我的分享到此结束，感谢大家的聆听。现在是问答环节，大家对OMX有任何问题，都可以提出来。"}];
    const stage = document.getElementById('stage');
    const counter = document.getElementById('counter');
    const progress = document.getElementById('progress');
    const notes = document.getElementById('notes');
    const notesTitle = document.getElementById('notesTitle');
    const notesMeta = document.getElementById('notesMeta');
    const notesBody = document.getElementById('notesBody');
    const hashIndex = Number.parseInt(location.hash.slice(1), 10);
    const savedIndex = Number.parseInt(localStorage.getItem('omx-source-deck-index'), 10);
    const initialIndex = Number.isFinite(hashIndex) ? hashIndex - 1 : (Number.isFinite(savedIndex) ? savedIndex : 0);
    let index = Math.max(0, Math.min(slides.length - 1, initialIndex));
    let notesOpen = false;
    function render(replace = false) {
      const number = String(index + 1).padStart(2, '0');
      stage.classList.add('loading');
      stage.src = 'slides/' + number + '.html';
      stage.title = slides[index].title;
      counter.textContent = number + ' / ' + String(slides.length).padStart(2, '0');
      progress.style.width = ((index + 1) / slides.length * 100) + '%';
      notesTitle.textContent = slides[index].title;
      notesMeta.textContent = number + ' · SPEAKER NOTES';
      notesBody.textContent = slides[index].notes || '本页没有演讲者备注。';
      localStorage.setItem('omx-source-deck-index', String(index));
      const hash = '#' + (index + 1);
      replace ? history.replaceState(null, '', hash) : history.pushState(null, '', hash);
    }
    function go(delta) { const next = Math.max(0, Math.min(slides.length - 1, index + delta)); if (next === index) return; index = next; render(); }
    function goTo(next) { index = Math.max(0, Math.min(slides.length - 1, next)); render(); }
    function toggleNotes(force) { notesOpen = typeof force === 'boolean' ? force : !notesOpen; notes.classList.toggle('open', notesOpen); notes.setAttribute('aria-hidden', String(!notesOpen)); }
    async function toggleFullscreen() { if (!document.fullscreenElement) await document.documentElement.requestFullscreen?.(); else await document.exitFullscreen?.(); }
    function act(action) { if (action === 'next') go(1); if (action === 'prev') go(-1); if (action === 'first') goTo(0); if (action === 'last') goTo(slides.length - 1); if (action === 'notes') toggleNotes(); if (action === 'fullscreen') toggleFullscreen(); }
    document.getElementById('prev').onclick = () => act('prev');
    document.getElementById('next').onclick = () => act('next');
    document.getElementById('toggleNotes').onclick = () => act('notes');
    document.getElementById('fullscreen').onclick = () => act('fullscreen');
    stage.onload = () => stage.classList.remove('loading');
    addEventListener('message', (event) => event.data?.deckAction && act(event.data.deckAction));
    addEventListener('popstate', () => { const next = Number.parseInt(location.hash.slice(1), 10); index = Number.isFinite(next) ? Math.max(0, Math.min(slides.length - 1, next - 1)) : 0; render(true); });
    addEventListener('mousemove', () => { document.body.classList.add('show-controls'); clearTimeout(window.__controlsTimer); window.__controlsTimer = setTimeout(() => document.body.classList.remove('show-controls'), 1200); });
    addEventListener('keydown', (event) => { const map = { ArrowRight:'next', ArrowDown:'next', ' ':'next', PageDown:'next', ArrowLeft:'prev', ArrowUp:'prev', PageUp:'prev', Home:'first', End:'last', n:'notes', N:'notes', f:'fullscreen', F:'fullscreen' }; if (event.key === 'Escape' && notesOpen) { event.preventDefault(); toggleNotes(false); return; } if (!map[event.key]) return; event.preventDefault(); act(map[event.key]); });
    render(true);
  </script>
</body>
</html>
